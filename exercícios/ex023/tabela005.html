<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Simples</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            border: 1px solid black;
            width: 400px;
        }

        tr, th,  td {
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }

        .amarelo {
            background-color: yellow;
        }

        .vermelho {
            background-color: red;
        }
    </style>
</head>
<body>
    <table>
        <colgroup>
            <col class="amarelo">
            <col class="vermelho" span="2">
            <col>
        </colgroup>
        <tr>
            <th>Nome</th>
            <th>Idade</th>
            <th>Sexo</th>
        </tr>
        <tr>
            <td>Maria</td>
            <td>12 Anos</td>
            <td>Feminino</td>
        </tr>
        <tr>
            <td>Victoria</td>
            <td>19 Anos</td>
            <td>Feminino</td>
        </tr>
    </table>
</body>
</html>
